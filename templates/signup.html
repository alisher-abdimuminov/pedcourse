<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish | LMS-Pedagogika</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-slate-50 font-['Inter']">

    <div class="min-h-screen flex items-center justify-center p-4">
        <div
            class="max-w-5xl w-full bg-white rounded-[2rem] shadow-2xl shadow-indigo-100 overflow-hidden flex flex-col md:flex-row-reverse">

            <div class="md:w-1/2 bg-indigo-600 p-12 text-white flex flex-col justify-between relative overflow-hidden">
                <div class="relative z-10 text-right">
                    <div class="flex items-center justify-end gap-2 mb-12">
                        <span class="text-xl font-bold tracking-tight uppercase">LMS-PEDAGOGIKA</span>
                        <div
                            class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-indigo-600 font-bold text-xl">
                            P</div>
                    </div>
                    <h2 class="text-4xl font-bold leading-tight mb-6">Yangi imkoniyatlar <br> eshigini oching.</h2>
                    <p class="text-indigo-100 text-lg">Minglab ustozlar hamjamiyatiga qo'shiling va zamonaviy
                        metodikalarni o'rganing.</p>
                </div>

                <div class="absolute -top-16 -right-16 w-64 h-64 bg-indigo-500 rounded-full opacity-50"></div>
                <div class="absolute bottom-20 -left-20 w-40 h-40 bg-indigo-400 rounded-full opacity-30"></div>
            </div>

            <div class="md:w-1/2 p-8 md:p-16">
                <div class="mb-10">
                    <h3 class="text-3xl font-bold text-slate-800">Ro'yxatdan o'tish</h3>
                    <p class="text-slate-500 mt-2">Shaxsiy kabinetingizni yarating</p>
                </div>

                <form class="space-y-5" method="post">
                    {% csrf_token %}
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Ism</label>
                            <input type="text" name="first_name"
                                class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Familiya</label>
                            <input type="text" name="last_name"
                                class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Foydalanuvchi nomi</label>
                        <input type="text" name="username"
                            class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Email</label>
                        <input type="email" name="email"
                            class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Parol yarating</label>
                        <input type="password" placeholder="••••••••"
                            class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>

                    <button
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-200 transition transform active:scale-[0.98]">
                        Hisob yaratish
                    </button>
                </form>

                <p class="text-center mt-10 text-slate-600">
                    Akkauntingiz bormi? <a href="{% url 'login' %}"
                        class="text-indigo-600 font-bold hover:underline">Kirish</a>
                </p>
            </div>
        </div>
    </div>

</body>

</html>
